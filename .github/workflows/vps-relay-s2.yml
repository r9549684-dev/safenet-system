name: VPS SSH Relay (Server #2)

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Shell command to run on Server #2'
        required: true
        default: 'echo "hello from Server #2"; uptime; docker ps'

jobs:
  run-on-vps:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY_S2 }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST_S2 }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Debug key
        run: |
          echo "secret length: $(echo "${{ secrets.VPS_SSH_KEY_S2 }}" | wc -c)"
          echo "decoded first bytes:"
          echo "${{ secrets.VPS_SSH_KEY_S2 }}" | base64 -d | head -c 40 | cat -v
          echo ""
          echo "decoded file size:"
          echo "${{ secrets.VPS_SSH_KEY_S2 }}" | base64 -d | wc -c

      - name: Run command on Server #2
        run: |
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=10 \
            ${{ secrets.VPS_USER_S2 }}@${{ secrets.VPS_HOST_S2 }} \
            '${{ github.event.inputs.command }}'

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_ed25519
