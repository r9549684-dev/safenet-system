name: Deploy Stealth to Server #1

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Write Server #1 SSH key
        run: |
          echo "${{ secrets.SERVER1_SSH_KEY }}" | base64 -d > /tmp/server1_key
          chmod 600 /tmp/server1_key

      - name: Copy key to Server #2
        run: |
          scp -i /tmp/server1_key -o StrictHostKeyChecking=no \
            /tmp/server1_key root@38.244.136.233:/tmp/server1_key

      - name: Check WG tunnel (Server #2 → Server #1)
        run: |
          ssh -i /tmp/server1_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            root@38.244.136.233 \
            "ping -c 2 -W 3 10.10.10.1 && echo WG_OK || echo WG_DOWN"

      - name: Fix wg1 (remove stealth — plain WG can't parse it)
        run: |
          ssh -i /tmp/server1_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            root@38.244.136.233 \
            "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i /tmp/server1_key root@38.180.253.219 'bash -s'" << 'SCRIPT'
          set -e
          echo "=== Remove stealth from wg1.conf ==="
          sed -i '/^Jc\|^Jmin\|^Jmax\|^S1\|^S2/d' /etc/wireguard/wg1.conf
          echo "=== Bring wg1 up ==="
          wg-quick up wg1
          echo "=== Verify ==="
          wg show wg1
          ping -c 2 -W 3 10.10.10.2 && echo "WG_OK" || echo "WG_DOWN"
          echo "=== DONE ==="
          SCRIPT

      - name: Install AmneziaWG on Server #1
        run: |
          ssh -i /tmp/server1_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            root@38.244.136.233 \
            "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i /tmp/server1_key root@10.10.10.1 'bash -s'" << 'SCRIPT'
          set -e
          echo "=== Install AmneziaWG ==="
          if ! dpkg -l amneziawg-go 2>/dev/null | grep -q '^ii'; then
            apt-get update -qq
            apt-get install -y -qq amneziawg-go 2>&1 || echo "amneziawg-go not in repo, trying kernel module..."
            if ! command -v awg-quick &>/dev/null; then
              echo "=== Trying kernel module ==="
              apt-get install -y -qq amneziawg-dkms 2>&1 || echo "dkms not available"
            fi
          fi
          echo "=== Check AWG ==="
          which awg-quick 2>/dev/null && echo "awg-quick found" || echo "awg-quick NOT found"
          which wg-quick && echo "wg-quick still available"
          echo "=== DONE ==="
          SCRIPT

      - name: Add stealth and restart with AmneziaWG
        run: |
          ssh -i /tmp/server1_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            root@38.244.136.233 \
            "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i /tmp/server1_key root@10.10.10.1 'bash -s'" << 'SCRIPT'
          set -e
          echo "=== Add stealth to wg1.conf ==="
          if ! grep -q Jc /etc/wireguard/wg1.conf 2>/dev/null; then
            cat >> /etc/wireguard/wg1.conf << 'WGEOF'
          Jc = 3
          Jmin = 15
          Jmax = 20
          S1 = 55
          S2 = 25
          WGEOF
            echo "Stealth added"
          else
            echo "Stealth already present"
          fi

          echo "=== Copy config to AWG dir ==="
          mkdir -p /etc/amnezia/amneziawg
          cp /etc/wireguard/wg1.conf /etc/amnezia/amneziawg/wg1.conf

          echo "=== Restart wg1 with AWG ==="
          wg-quick down wg1 2>/dev/null || true
          awg-quick up wg1

          echo "=== Verify ==="
          sleep 2
          grep -E "Jc|Jmin|Jmax|S1|S2" /etc/wireguard/wg1.conf
          wg show wg1 2>/dev/null || wg show
          ping -c 2 -W 3 10.10.10.2 && echo "WG_OK" || echo "WG_DOWN"
          echo "=== DONE ==="
          SCRIPT

      - name: Cleanup
        if: always()
        run: |
          ssh -i /tmp/server1_key -o StrictHostKeyChecking=no root@38.244.136.233 \
            "rm -f /tmp/server1_key" 2>/dev/null || true
          rm -f /tmp/server1_key