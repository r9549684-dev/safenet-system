name: Deploy Stealth to Server #1

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install sshpass
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass

      - name: Write Server #1 SSH key
        run: |
          echo "${{ secrets.SERVER1_SSH_KEY }}" > /tmp/server1_key
          chmod 600 /tmp/server1_key

      - name: Deploy via Server #2 jump host
        run: |
          sshpass -p "${{ secrets.SERVER2_PASSWORD }}" \
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
              root@38.244.136.233 \
              "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i /tmp/server1_key root@10.10.10.1 'bash -s'" << 'SCRIPT'
          set -e
          echo "=== Pull code ==="
          cd /opt/safenet/backend && git pull origin master

          echo "=== Add stealth to wg1.conf ==="
          if ! grep -q Jc /etc/wireguard/wg1.conf 2>/dev/null; then
            cat >> /etc/wireguard/wg1.conf << 'WGEOF'
          Jc = 3
          Jmin = 15
          Jmax = 15
          S1 = 55
          S2 = 25
          WGEOF
            echo "Stealth added"
          else
            echo "Stealth already present"
          fi

          echo "=== Update DB ==="
          docker exec safenet_db psql -U safenet -d safenet -c "UPDATE servers SET meta = jsonb_set(COALESCE(meta,'{}')::jsonb,'{stealth}','{\"Jc\":3,\"Jmin\":15,\"Jmax\":15,\"S1\":55,\"S2\":25}'::jsonb) WHERE id = 1;" 2>&1 || echo "DB update skipped"

          echo "=== Restart backend ==="
          cd /opt/safenet && (docker compose restart safenet_vpn_backend 2>&1 || docker restart safenet_vpn_backend 2>&1)

          echo "=== Verify ==="
          sleep 3
          curl -s http://localhost:8001/health
          echo ""
          grep -E "Jc|Jmin|Jmax|S1|S2" /etc/wireguard/wg1.conf
          echo "=== DONE ==="
          SCRIPT

      - name: Cleanup
        if: always()
        run: rm -f /tmp/server1_key