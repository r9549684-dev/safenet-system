name: Deploy Stealth to Server #1

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Write Server #1 SSH key
        run: |
          echo "${{ secrets.SERVER1_SSH_KEY }}" | base64 -d > /tmp/server1_key
          chmod 600 /tmp/server1_key

      - name: Copy key to Server #2
        run: |
          scp -i /tmp/server1_key -o StrictHostKeyChecking=no \
            /tmp/server1_key root@38.244.136.233:/tmp/server1_key

      - name: Check WG tunnel (Server #2 → Server #1)
        run: |
          ssh -i /tmp/server1_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            root@38.244.136.233 \
            "ping -c 2 -W 3 10.10.10.1 && echo WG_OK || echo WG_DOWN"

      - name: Deploy stealth code
        run: |
          ssh -i /tmp/server1_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
            root@38.244.136.233 \
            "ssh -o StrictHostKeyChecking=no -o ConnectTimeout=15 -i /tmp/server1_key root@10.10.10.1 'bash -s'" << 'SCRIPT'
          set -e

          echo "=== Add stealth to wg1.conf ==="
          if ! grep -q Jc /etc/wireguard/wg1.conf 2>/dev/null; then
            cat >> /etc/wireguard/wg1.conf << 'WGEOF'
          Jc = 3
          Jmin = 15
          Jmax = 15
          S1 = 55
          S2 = 25
          WGEOF
            echo "Stealth added"
          else
            echo "Stealth already present"
          fi

          echo "=== Restart wg1 ==="
          wg-quick down wg1 2>/dev/null || true
          wg-quick up wg1

          echo "=== Restart backend ==="
          cd /opt/safenet && (docker compose restart safenet_vpn_backend 2>&1 || docker restart safenet_vpn_backend 2>&1 || true)

          echo "=== Verify ==="
          sleep 2
          grep -E "Jc|Jmin|Jmax|S1|S2" /etc/wireguard/wg1.conf
          wg show wg1 2>/dev/null || wg show
          echo "=== DONE ==="
          SCRIPT

      - name: Cleanup
        if: always()
        run: |
          ssh -i /tmp/server1_key -o StrictHostKeyChecking=no root@38.244.136.233 \
            "rm -f /tmp/server1_key" 2>/dev/null || true
          rm -f /tmp/server1_key