name: Setup Server #2 SSH Key (one-time)

on: workflow_dispatch

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Write Server #1 key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER1_SSH_KEY }}" | base64 -d > /tmp/server1_key
          chmod 600 /tmp/server1_key

      - name: Add new SSH key to Server #2 via existing key
        run: |
          ssh -i /tmp/server1_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            root@38.244.136.233 \
            'echo "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEks3pKOMy/gnVbK01pdTmc4TD8gtWCjCttN3SzYIjNy github-actions-safenet-s2" >> ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys && echo KEY_ADDED_OK'

      - name: Cleanup
        if: always()
        run: rm -f /tmp/server1_key
