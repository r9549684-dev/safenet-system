name: Setup Server #2 SSH Key (one-time)

on: workflow_dispatch

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Add GitHub Actions SSH key to Server #2
        env:
          PASSWORD: ${{ secrets.SERVER2_PASSWORD }}
        run: |
          PUB_KEY="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEks3pKOMy/gnVbK01pdTmc4TD8gtWCjCttN3SzYIjNy github-actions-safenet-s2"
          sshpass -p "$PASSWORD" ssh -o StrictHostKeyChecking=no \
            root@38.244.136.233 \
            "mkdir -p ~/.ssh && chmod 700 ~/.ssh && echo '$PUB_KEY' >> ~/.ssh/authorized_keys && chmod 600 ~/.ssh/authorized_keys && echo KEY_ADDED_OK"
